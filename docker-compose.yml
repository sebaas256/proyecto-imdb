services:
  postgres:
    image: postgres:16
    container_name: postgres-container
    environment:
      POSTGRES_DB: origen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - imdb_network

  hop:
    image: apache/hop-web
    container_name: hop-web
    ports:
      - "8081:8080"
    volumes:
      - ./hop-projects:/files
    environment:
      - HOP_SERVER_USER=admin
      - HOP_SERVER_PASS=admin
    networks:
      - imdb_network

  cube:
    image: cubejs/cube:latest
    container_name: cube-semantic-layer
    ports:
      - "4000:4000" # Dashboard de desarrollo de Cube
      - "15432:15432" # (SQL API)
    environment:
      - CUBEJS_DB_TYPE=postgres
      - CUBEJS_DB_HOST=postgres # Nombre del servicio
      - CUBEJS_DB_NAME=IMDB
      - CUBEJS_DB_USER=postgres
      - CUBEJS_DB_PASS=postgres123
      - CUBEJS_API_SECRET=SecretCode123!
      - CUBEJS_SQL_USER=admin_cube
      - CUBEJS_SQL_PASSWORD=password123
    volumes:
      - ./cube:/cube/conf
    depends_on:
      - postgres
    networks:
      - imdb_network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase-bi
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres 
      - MB_DB_DBNAME=metabase_db
      - MB_DB_PORT=5432
      - MB_DB_USER=postgres
      - MB_DB_PASS=postgres123
      - MB_DB_HOST=postgres
    depends_on:
      - cube
    networks:
      - imdb_network

networks:
  imdb_network:
    driver: bridge
